services:
  - type: web
    name: verif-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
